backend:
  name: git-gateway
  branch: main

media_folder: "assets/portfolio"
public_folder: "/assets/portfolio"

collections:
  - name: "portfolio"
    label: "Portfolio Data"
    delete: false
    files:
      - name: "albums_list"
        label: "Manage Albums"
        file: "albums.json"
        format: "json"
        fields:
          - name: "albums"
            label: "Albums"
            widget: "list"
            summary: "{{fields.title}} (ID: {{fields.id}})"
            add_to_top: false
            fields:
              - {label: "Album ID (Lowercase, no spaces)", name: "id", widget: "string"}
              - {label: "Album Title", name: "title", widget: "string"}
              - {label: "Show Title on Cover?", name: "showTitle", widget: "boolean", default: true}
              - label: "Photos"
                name: "photos"
                widget: "list"
                summary: "{{fields.photo}}"
                fields:
                  - label: "Photo"
                    name: "photo"
                    widget: "image"
                    # This ensures photos go to assets/portfolio/ALBUM_ID/raw/
                    media_folder: "assets/portfolio/{{id}}/raw"
                    public_folder: "/assets/portfolio/{{id}}/raw"
