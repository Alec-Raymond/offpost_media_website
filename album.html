<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album — OFFPOST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/noise.css">
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-text: #f0ece4;
      --font-display: 'Oswald', sans-serif;
      --font-body: 'Roboto', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
    }
    .viewer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
    }
    .viewer-photo {
      max-width: calc(100vw - 8rem);
      max-height: calc(100vh - 8rem);
      width: auto;
      height: auto;
      object-fit: contain;
      border: 4px solid #fff;
      display: block;
    }
    .viewer-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: 2rem;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.3s;
      z-index: 10;
      padding: 1rem;
    }
    .viewer-nav:hover { opacity: 1; }
    .viewer-nav--prev { left: 0.5rem; }
    .viewer-nav--next { right: 0.5rem; }
    .viewer-counter {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35);
      z-index: 10;
    }
    .viewer-back {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      color: var(--color-text);
      text-decoration: none;
      font-family: var(--font-display);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .viewer-back:hover { opacity: 1; }

    @media (max-width: 768px) {
      .viewer { padding: 3rem 1rem; }
      .viewer-photo {
        max-width: calc(100vw - 4rem);
        max-height: calc(100vh - 6rem);
      }
      .viewer-nav { font-size: 1.5rem; }
      .viewer-nav--prev { left: 0.25rem; }
      .viewer-nav--next { right: 0.25rem; }
    }
  </style>
</head>
<body>
  <div id="noise-overlay" aria-hidden="true"></div>

  <a href="portfolio.html" class="viewer-back">← Portfolio</a>

  <div class="viewer">
    <picture id="viewer-picture"></picture>
  </div>

  <button class="viewer-nav viewer-nav--prev" id="prev-btn">←</button>
  <button class="viewer-nav viewer-nav--next" id="next-btn">→</button>
  <div class="viewer-counter" id="counter"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const albumId = params.get('id');
      if (!albumId) { window.location.href = 'portfolio.html'; return; }

      let photos = [];
      let current = 0;

      try {
        const response = await fetch('albums.json');
        const data = await response.json();
        const album = data.albums.find(a => a.id === albumId);
        if (!album) { window.location.href = 'portfolio.html'; return; }

        document.title = (album.title || 'Album') + ' — OFFPOST';

        photos = album.photos.map(p => {
          const photoPath = typeof p === 'object' ? p.photo : p;
          return photoPath.split('/').pop().split('.')[0];
        });
      } catch (err) {
        console.error('Failed to load album:', err);
        return;
      }

      const picture = document.getElementById('viewer-picture');
      const counter = document.getElementById('counter');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');

      function showPhoto(index) {
        current = index;
        const name = photos[current];
        picture.innerHTML = `
          <source type="image/avif" srcset="/assets/portfolio/medium/${name}.avif 1200w, /assets/portfolio/full/${name}.avif 2400w" sizes="calc(100vw - 6rem)">
          <source type="image/webp" srcset="/assets/portfolio/medium/${name}.webp 1200w, /assets/portfolio/full/${name}.webp 2400w" sizes="calc(100vw - 6rem)">
          <img src="/assets/portfolio/medium/${name}.jpg" srcset="/assets/portfolio/medium/${name}.jpg 1200w, /assets/portfolio/full/${name}.jpg 2400w" sizes="calc(100vw - 6rem)" class="viewer-photo" alt="Photo ${current + 1} of ${photos.length}">
        `;
        counter.textContent = `${current + 1} / ${photos.length}`;
        prevBtn.style.display = current === 0 ? 'none' : '';
        nextBtn.style.display = current === photos.length - 1 ? 'none' : '';
      }

      prevBtn.addEventListener('click', () => { if (current > 0) showPhoto(current - 1); });
      nextBtn.addEventListener('click', () => { if (current < photos.length - 1) showPhoto(current + 1); });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && current > 0) showPhoto(current - 1);
        if (e.key === 'ArrowRight' && current < photos.length - 1) showPhoto(current + 1);
        if (e.key === 'Escape') window.location.href = 'portfolio.html';
      });

      if (photos.length) showPhoto(0);
    });
  </script>
</body>
</html>
